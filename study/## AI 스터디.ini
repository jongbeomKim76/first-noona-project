## AI 스터디

1. 기초
 - 파이썬 문법, 데이터 처리 기초, AI 윤리
2. 머신러닝
 - 회귀, 분류, 클러스터링 알고리즘 이해
3. 딥러닝
 - 신경망 구조, 오차역전파, CNN/RNN 기초
4. 생성형 AI
 - 프롬프트 엔지니어링, RAG(검색 증강 생성)
5. 에이전트
 - AI 에이전트 설계 및 업무 자동화 워크플로우


1단계 : LLM 기초 및 프롬프트 엔지니어링
 - 핵심 : API 호출 최적화 및 구조화된 데이터 출력
 - 학습 : Few-shot, Chain-of-Thought, JSON MODE, Function Calling
 - 실습 : OpenAI/Anthropic API를 이용한 CLI도구 만들기

2단계 : RAG(검색 증강 생성) 시스템 구축
 - 핵심 : 외부 데이터를 AI에게 학습시키지 않고 참조하게 만드는 기술
 - 학습 : Vector Database(Pinecone, Milvus), Embedding 모델, Chunking 전략
 - 실습 : 사내 문서나 기술 블로그 기반의 '전문 지식 Q&A 챗봇' 구현

3단계 : LLM 프레임워크 및 오케스트레이션
 - 핵심 : 복잡한 워크플로우 자동화
 - 학습 : LangChain, LlamaIndex, CrewAI(Multi-Agent 시스템)
 - 실습 : 여러 AI 에이전트가 협업하여 코드를 리뷰하고 수정하는 자동화 파이프라인 구축

4단계 : MLOps & LLMOps
 - 핵심 : 모델 평가 및 배포, 모니터링
 - 학습 : 성능 평가 지표(RAGAS), 비용 최적화, 보안(PromptInjection방어)
 - 실습 : LangSmith 나 Weights & Biases를 활용한 응답 품질 모니터링 시스템 구축


언어 : Python, TypeScript
프레임워크 : LangChain, Pydantic(데이터검증용)
인프라 : Docker, Hugging Face Hub(오픈소스 모델 활용)
로컬 테스트 : Ollama(내 컴퓨터에서 Llama3 같은 모델 돌리기)

ex) GitHub Issue 분석하여 자동으로 라벨을 달아주고 담당자를 추천해 주는 봇 만들기

## java 기반 AI
1. 백엔드 (Spring Boot 3.4 & Spring AI)
 - Spring AI 활용 : OpenAI, Ollama, Anthropic 등 다양한 LLM API를 표준화된 인터페이스로 연동
 - RAG(Retrieval Augmented Generation) 구현 : PDF/Markdown 파싱 : 백엔드에서 문서를 읽고 의미 단위로 쪼개기(Chunking)
 - Vector Database 연동 : PGVector(PostgreSQL확장), Redis 등을 사용하여 백터 데이터 저장 및 검색.
 - Advisor(인터셉터) 패턴 : 질문 전후에 필터링을 걸어 보안(프롬프트 인젝션 방어) 및 로깅 처리.
2. 프론트엔드 (React & VercelAI SDK)
 : 사용자 경험(UX)이 핵심입니다. AI응답은 한 번에 나오지 않고 스트리밍으로 전달되어야 합니다.
 - Streaming UI : 서버에서 보내는 Server-Sent Events (SSE)를 받아 실시간으로 타이핑되는 효과 구현
 - Vercel AI SDK Core/React : 자바 백엔드와 연동하여 챗봇 UI, 상태 관리(마지막 메시지 저장 등)를 효율적으로 처리
 - Markdown Rendering : AI가 보내주는 코드 블록이나 마크다운을 예쁘게 보여주는 컴포넌드 라이브러리 학습
 


