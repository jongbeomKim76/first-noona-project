### 바이브 코딩
VS CODE 실행
GitHub Copilot 기능 추가

## 프로젝트 개요
- 프로젝트명: 바이브 코딩
- 프로젝트 설명: 바이브 코딩은 개발자들이 자신의 프로젝트를 공유하고 협업할 수 있는 플랫폼입니다. 사용자들은 게시글을 작성하고, 댓글을 달며, 다른 사용자들과 소통할 수 있습니다. 또한, 좋아요와 팔로우 기능을 통해 관심 있는 게시글과 사용자를 쉽게 찾을 수 있습니다.

## 프로젝트 목표
- 사용자 친화적인 인터페이스 제공
- 다양한 기능을 통해 사용자 간의 소통 촉진
- 안정적이고 확장 가능한 시스템 구축

## 요구사항 분석
- 사용자 요구사항
  - 회원가입 및 로그인 기능
  - 게시글 작성, 조회, 수정, 삭제 기능
  - 댓글 작성, 조회, 수정, 삭제 기능
  - 좋아요 기능
  - 팔로우 기능
  - 검색 기능
- 관리자 요구사항
  - 사용자 관리 기능
  - 게시글 관리 기능
  - 댓글 관리 기능
    - 통계 기능
    - 알림 기능
    - 기타 관리 기능

## 시스템 아키텍처 설계
- 클라이언트-서버 아키텍처
- RESTful API 설계
- 데이터베이스 설계

